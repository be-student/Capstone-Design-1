# =============================================================================
# Docker Compose Configuration
# E-Commerce Customer Churn Prediction & Retention Optimization System
# =============================================================================
# Services:
#   - pipeline:   Main ML/DL training and inference pipeline
#   - dashboard:  Streamlit dashboard (localhost:8501)
#   - redis:      Redis for real-time scoring and caching
#   - mlflow:     MLflow tracking server (localhost:5000)
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # MLflow Tracking Server
  # ---------------------------------------------------------------------------
  # Uses local SQLite backend and filesystem artifact store.
  # No PostgreSQL required.
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: churn-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - churn-network

  # ---------------------------------------------------------------------------
  # Redis (Streaming & Caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: churn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - churn-network

  # ---------------------------------------------------------------------------
  # ML/DL Pipeline
  # ---------------------------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: churn-pipeline
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./src:/app/src
      - mlflow-data:/mlflow
      - pipeline-output:/app/output
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - churn-network

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config
      - ./src:/app/src
      - mlflow-data:/mlflow
      - pipeline-output:/app/output
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - churn-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  mlflow-data:
    driver: local
  redis-data:
    driver: local
  pipeline-output:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  churn-network:
    driver: bridge
