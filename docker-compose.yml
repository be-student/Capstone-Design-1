# =============================================================================
# Docker Compose Configuration
# E-Commerce Customer Churn Prediction & Retention Optimization System
# =============================================================================
# Services:
#   - pipeline:   Main ML/DL training and inference pipeline
#   - dashboard:  Streamlit dashboard (localhost:8501)
#   - redis:      Redis for real-time scoring and caching
#   - mlflow:     MLflow tracking server (localhost:5000)
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # MLflow Tracking Server
  # ---------------------------------------------------------------------------
  # Uses local SQLite backend and filesystem artifact store.
  # No PostgreSQL required.
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: churn-mlflow
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - churn-network

  # ---------------------------------------------------------------------------
  # Redis (Streaming & Caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: churn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - churn-network

  # ---------------------------------------------------------------------------
  # ML/DL Pipeline
  # ---------------------------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: churn-pipeline
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./src:/app/src
      - ./models:/app/models
      - ./results:/app/results
      - mlflow-data:/mlflow
      - pipeline-output:/app/output
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - churn-network

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # ---------------------------------------------------------------------------
  # The dashboard waits for the pipeline container to finish before launching.
  # It uses the orchestration entrypoint (scripts/entrypoint.sh) which:
  #   1. Runs the full ML pipeline (data generation, training, evaluation)
  #   2. Verifies pipeline outputs exist
  #   3. Launches Streamlit dashboard
  # Set SKIP_PIPELINE=true if pipeline already ran or data is pre-generated.
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./src:/app/src
      - ./models:/app/models
      - ./results:/app/results
      - mlflow-data:/mlflow
      - pipeline-output:/app/output
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      # Set SKIP_PIPELINE=true to skip pipeline and launch dashboard directly
      - SKIP_PIPELINE=${SKIP_PIPELINE:-false}
      - PIPELINE_MAX_RETRIES=${PIPELINE_MAX_RETRIES:-1}
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: ["streamlit", "run", "src/dashboard/app.py",
              "--server.port=8501",
              "--server.address=0.0.0.0",
              "--server.headless=true"]
    networks:
      - churn-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  mlflow-data:
    driver: local
  redis-data:
    driver: local
  pipeline-output:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  churn-network:
    driver: bridge
